services:
  - type: web
    name: brasil-mx
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: brasil-mx-db
          property: connectionString
    autoDeploy: true